{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle fs-1" style="color: var(--accent-color);"></i>
                        <h2 class="brand-font mt-2">Bienvenido</h2>
                    </div>
                    <form method="POST">
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" name="email" placeholder="Email" required>
                            <label><i class="bi bi-envelope me-2"></i>Email</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" name="password" placeholder="Contraseña" required>
                            <label><i class="bi bi-lock me-2"></i>Contraseña</label>
                        </div>
                        <button type="submit" class="btn btn-accent w-100 mb-3"><i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión</button>
                        <p class="text-center mb-0">¿No tienes cuenta? <a href="{{ url_for('register') }}" style="color: var(--accent-color);">Regístrate</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
