{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus fs-1" style="color: var(--accent-color);"></i>
                        <h2 class="brand-font mt-2">Crear Cuenta</h2>
                    </div>
                    <form method="POST">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" name="nombre" placeholder="Nombre" required>
                            <label><i class="bi bi-person me-2"></i>Nombre Completo</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" name="email" placeholder="Email" required>
                            <label><i class="bi bi-envelope me-2"></i>Email</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" name="password" placeholder="Contraseña" required minlength="6">
                            <label><i class="bi bi-lock me-2"></i>Contraseña (mín. 6)</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" name="confirm_password" placeholder="Confirmar" required>
                            <label><i class="bi bi-lock-fill me-2"></i>Confirmar Contraseña</label>
                        </div>
                        <button type="submit" class="btn btn-accent w-100 mb-3"><i class="bi bi-person-check me-2"></i>Crear Cuenta</button>
                        <p class="text-center mb-0">¿Ya tienes cuenta? <a href="{{ url_for('login') }}" style="color: var(--accent-color);">Inicia sesión</a></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
